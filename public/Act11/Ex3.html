<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 11 - Ejercicio 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        p>a {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            color: #222;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        p>a:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: 1.2fr 1fr 1.6fr 1fr 1fr;
            gap: 12px;
            background-color: #ffffff;
            padding: 12px;
            width: 100vw;
            height: 100vh;
        }

        .item {
            border-radius: 2px;
            transition: transform 0.2s ease, filter 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 800;
            font-size: clamp(0.7rem, 2vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            overflow: hidden;
            text-align: center;
        }

        .small-txt {
            font-size: clamp(0.6rem, 1vw, 1rem);
        }

        .vertical-text {
            writing-mode: vertical-lr;
            text-orientation: upright;
            letter-spacing: 6px;
        }

        .item:hover {
            transform: scale(0.99);
            filter: brightness(1.05);
        }

        .purple {
            background-color: #8E44AD;
        }

        .blue {
            background-color: #55A8E8;
        }

        .red {
            background-color: #E65A48;
        }

        .green {
            background-color: #34B358;
        }

        .pale-purple {
            background-color: #AD8CBB;
        }

        .orange {
            background-color: #F89C23;
        }

        .top-purple {
            grid-column: 1 / 8;
            grid-row: 1 / 2;
        }

        .right-orange {
            grid-column: 8 / 9;
            grid-row: 1 / 6;
        }

        .left-orange {
            grid-column: 1 / 2;
            grid-row: 2 / 6;
        }

        .mid-green {
            grid-column: 2 / 8;
            grid-row: 2 / 3;
        }

        .blue-1 {
            grid-column: 2 / 5;
            grid-row: 3 / 4;
        }

        .blue-2 {
            grid-column: 5 / 8;
            grid-row: 3 / 4;
        }

        .p1 {
            grid-column: 2 / 3;
            grid-row: 4 / 5;
        }

        .p2 {
            grid-column: 3 / 4;
            grid-row: 4 / 5;
        }

        .p3 {
            grid-column: 2 / 3;
            grid-row: 5 / 6;
        }

        .p4 {
            grid-column: 3 / 4;
            grid-row: 5 / 6;
        }

        .bot-red {
            grid-column: 4 / 6;
            grid-row: 4 / 6;
        }

        .p5 {
            grid-column: 6 / 7;
            grid-row: 4 / 5;
        }

        .p6 {
            grid-column: 7 / 8;
            grid-row: 4 / 5;
        }

        .p7 {
            grid-column: 6 / 7;
            grid-row: 5 / 6;
        }

        .p8 {
            grid-column: 7 / 8;
            grid-row: 5 / 6;
        }
    </style>
</head>

<body>
    <p><a href="/index.html">Portada</a></p>
    <div class="grid-container">
        <div class="item purple top-purple">Lógica Global</div>

        <div class="item orange right-orange vertical-text">Diferenciador</div>
        <div class="item orange left-orange vertical-text">Impacto</div>

        <div class="item green mid-green">Distribución</div>
        <div class="item blue blue-1">Frontend web</div>
        <div class="item blue blue-2">Databases</div>

        <div class="item pale-purple p1 small-txt">HTML</div>
        <div class="item pale-purple p2 small-txt">CSS</div>
        <div class="item pale-purple p3 small-txt">JS</div>
        <div class="item pale-purple p4 small-txt">API</div>

        <div class="item red bot-red">Core Engine</div>

        <div class="item pale-purple p5 small-txt">SQL</div>
        <div class="item pale-purple p6 small-txt">JSON</div>
        <div class="item pale-purple p7 small-txt">VUE</div>
        <div class="item pale-purple p8 small-txt">NODE</div>
    </div>
</body>

</html>
