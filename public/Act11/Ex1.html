<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 11 - Ejercicio 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        p>a {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            color: #222;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        p>a:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            background-color: #ffffff;
            padding: 12px;
            width: 100vw;
            height: 100vh;
        }

        .item {
            border-radius: 2px;
            transition: transform 0.2s ease, filter 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 800;
            font-size: clamp(1rem, 2.5vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            overflow: hidden;
            text-align: center;
        }

        .vertical-text {
            writing-mode: vertical-lr;
            text-orientation: upright;
            letter-spacing: 6px;
        }

        .item:hover {
            transform: scale(0.99);
            filter: brightness(1.05);
        }

        .purple {
            background-color: #8E44AD;
        }

        .blue {
            background-color: #55A8E8;
        }

        .red {
            background-color: #E65A48;
        }

        .green {
            background-color: #34B358;
        }

        .pale-purple {
            background-color: #AD8CBB;
        }

        .orange {
            background-color: #F89C23;
        }

        .box1 {
            grid-column: 1 / 7;
            grid-row: 1 / 2;
        }

        .box2 {
            grid-column: 7 / 9;
            grid-row: 1 / 4;
        }

        .box3 {
            grid-column: 1 / 3;
            grid-row: 2 / 3;
        }

        .box4 {
            grid-column: 3 / 7;
            grid-row: 2 / 3;
        }

        .box5 {
            grid-column: 1 / 4;
            grid-row: 3 / 4;
        }

        .box6 {
            grid-column: 4 / 7;
            grid-row: 3 / 4;
        }
    </style>
</head>

<body>
    <p><a href="/index.html">Portada</a></p>
    <div class="grid-container">
        <div class="item purple box1">Creatividad</div>
        <div class="item blue box2 vertical-text">ESTRUCTURA</div>
        <div class="item red box3">Diseño</div>
        <div class="item green box4">Armonía Visual</div>
        <div class="item pale-purple box5">Progreso</div>
        <div class="item orange box6">Moderno</div>
    </div>
</body>

</html>
